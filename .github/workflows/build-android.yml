name: Build & Release Android APK

# Builds a signed release APK and publishes it (plus a latest.json manifest
# and a *.sha256 sidecar) to a GitHub Release. The in-app updater in the
# Capacitor Android build polls the GitHub Releases API for these assets.
#
# Triggers:
#   - Push of a semver tag (v1.2.3) → builds + creates a release for that tag.
#   - Manual dispatch (workflow_dispatch) with a version string → same flow,
#     useful for testing the pipeline without tagging.
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64     base64-encoded release keystore (.jks / .keystore)
#   KEYSTORE_PASSWORD   keystore password
#   KEY_ALIAS           key alias inside the keystore
#   KEY_PASSWORD        password for that key alias
#
# Generate a keystore locally with:
#   keytool -genkeypair -v -keystore athena-release.keystore \
#     -alias athena -keyalg RSA -keysize 2048 -validity 10000
# Then base64-encode it and paste into the KEYSTORE_BASE64 secret:
#   base64 -w0 athena-release.keystore > athena-release.keystore.b64
#
# IMPORTANT: every release APK must be signed with the SAME keystore, or
# Android will refuse to install the update as an "in-place" upgrade.
# Back up the keystore somewhere safe — losing it means users must reinstall.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.3, no leading v)"
        required: true
        type: string

permissions:
  contents: write # needed to create the GitHub Release + upload assets

jobs:
  build:
    name: Build signed APK + publish release
    runs-on: ubuntu-latest

    steps:
      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            # Strip leading "v" from the pushed tag.
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # versionCode: major*10000 + minor*100 + patch (e.g. 1.2.3 → 10203).
          # Must be monotonically increasing across releases.
          IFS='.' read -r MAJ MIN PAT <<< "$V"
          MAJ=${MAJ:-0}; MIN=${MIN:-0}; PAT=${PAT:-0}
          CODE=$(( MAJ * 10000 + MIN * 100 + PAT ))
          echo "versionCode=$CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$V versionCode=$CODE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-36
            build-tools;36.0.0

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install client dependencies
        run: bun install --frozen-lockfile
        working-directory: client

      - name: Build client (Vite)
        env:
          # Bake the version into the bundle so AboutSection can show it on web.
          # The native build reads the real version from App.getInfo() instead.
          VITE_UPDATE_REPO: ${{ github.repository }}
        run: bun run build
        working-directory: client

      - name: Sync Capacitor (copy web build into Android project)
        run: bunx cap sync android

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. Set it in repo Settings → Secrets before running this workflow."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/athena-release.keystore"
          echo "Keystore decoded to $RUNNER_TEMP/athena-release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/athena-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.versionCode }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PversionName="$VERSION_NAME" \
            -PversionCode="$VERSION_CODE" \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found in android/app/build/outputs/apk/release"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          # Stage under a clean, versioned name for the release asset.
          STAGED="$RUNNER_TEMP/athena-${{ steps.ver.outputs.version }}.apk"
          cp "$APK" "$STAGED"
          echo "staged=$STAGED" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: |
          cd "$RUNNER_TEMP"
          SHA=$(sha256sum "athena-${{ steps.ver.outputs.version }}.apk" | awk '{print $1}')
          echo "$SHA  athena-${{ steps.ver.outputs.version }}.apk" > "athena-${{ steps.ver.outputs.version }}.apk.sha256"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Write latest.json manifest
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          # The app primarily uses the GitHub Releases API, but this manifest
          # is a stable, cacheable fallback (e.g. for GitHub Pages mirroring).
          cat > "$RUNNER_TEMP/latest.json" <<EOF
          {
            "version": "$VERSION",
            "sha256": "$SHA256",
            "apk": "athena-$VERSION.apk",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat "$RUNNER_TEMP/latest.json"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.apk.outputs.staged }}
            ${{ runner.temp }}/athena-${{ steps.ver.outputs.version }}.apk.sha256
            ${{ runner.temp }}/latest.json
