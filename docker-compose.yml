services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: athena-server
    expose:
      - "3000"
    environment:
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
      DATABASE_URL: "file:/app/data/athena.db"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      SEED_USERNAME: ${SEED_USERNAME:-admin}
      SEED_PASSWORD: ${SEED_PASSWORD:-admin}
      # Comma-separated list of allowed CORS origins. For a single-origin public
      # deploy behind the host nginx, set this to the public URL.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-https://athena.tevuori.eu/auth/spotify/callback}
      # Athena code execution sandbox (run_code tool). Uses gVisor (runsc)
      # runtime for kernel-level isolation — safe for public multi-user hosts.
      # Requires the Docker socket mounted below + runsc installed on the host.
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
      SANDBOX_DOCKER_RUNTIME: ${SANDBOX_DOCKER_RUNTIME:-runsc}
      # Shared temp directory for sandbox code files. Must be the same path on
      # both the host and this container so the Docker daemon can resolve -v
      # mounts when spawning sandbox containers via the socket.
      SANDBOX_HOST_TMP: /tmp/athena-sandbox
    volumes:
      - athena-data:/app/data
      - athena-uploads:/app/uploads
      # Docker socket for the Athena code execution sandbox (run_code tool).
      # Safe when combined with the gVisor (runsc) runtime — sandbox containers
      # run inside a userspace kernel that intercepts syscalls, preventing
      # container escape to the host.
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared temp dir for sandbox code files (same path on host + container).
      - /tmp/athena-sandbox:/tmp/athena-sandbox
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: athena-client
    ports:
      # Bind to localhost only — the host nginx terminates TLS and proxies to this.
      - "127.0.0.1:8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  athena-data:
  athena-uploads:
