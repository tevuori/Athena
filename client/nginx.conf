# Production nginx config for the Athena client container.
# Serves the built SPA and reverse-proxies /api to the server container.
# The host-level nginx (deploy/nginx/athena.tevuori.eu.conf) terminates TLS
# and forwards everything to this container's :80.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # API → backend server container (Docker network DNS: "server").
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / long-lived streams (Athena chat, ntfy) — disable buffering + long timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
