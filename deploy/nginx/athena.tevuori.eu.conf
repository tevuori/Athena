# Host-level nginx site for athena.tevuori.eu.
# Terminates TLS (certbot) and proxies everything to the Athena client
# container bound at 127.0.0.1:8080. The client container's nginx then
# serves the SPA and reverse-proxies /api to the server container.
#
# Install:  sudo cp deploy/nginx/athena.tevuori.eu.conf /etc/nginx/sites-available/athena.tevuori.eu
#           sudo ln -s /etc/nginx/sites-available/athena.tevuori.eu /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# Then:     sudo certbot --nginx -d athena.tevuori.eu

server {
    listen 80;
    server_name athena.tevuori.eu;

    # Certbot will manage the TLS block (rewrite to 443 + ssl). Keep this
    # location so the HTTP→HTTPS redirect works before certbot runs.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name athena.tevuori.eu;

    # Certbot fills these in:
    # ssl_certificate /etc/letsencrypt/live/athena.tevuori.eu/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/athena.tevuori.eu/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / long-lived streams (Athena chat, ntfy) — disable buffering + long timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
